<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Bites</title>
  <style>
    :root {
      --cream:         #F2EFE6;
      --teal:          #2A7F7F;
      --teal-dark:     #1d5f5f;
      --red:            #CC3300;
      --muted:          #8a8070;
      --border:        rgba(42,127,127,0.15);
      --border-strong: rgba(42,127,127,0.3);
      --content-max:   600px;
      --content-min:   300px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #F2EFE6; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F2EFE6; color: #1a1a1a; min-width: var(--content-min); }

    /* ── DİL SEÇİM ── */
    #lang-screen {
      position: fixed; inset: 0; background: #F2EFE6; z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px;
    }
    .lang-logo-img { width: 220px; height: auto; }
    .lang-subtitle { font-size: 12px; color: #8a8070; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }
    .lang-buttons { display: flex; flex-direction: column; gap: 12px; width: 240px; }
    .lang-btn {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 0; border-radius: 10px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
      background: #2A7F7F; color: #fff; transition: background 0.2s;
    }
    .lang-btn:hover { background: #1d5f5f; }

    /* ── FULL WIDTH HEADER ── */
    .full-width-header {
      position: fixed; top: 0; left: 0; right: 0;
      background: #F2EFE6; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      z-index: 20; display: flex; justify-content: center;
    }
    .app-header {
      width: 100%; max-width: var(--content-max); min-width: var(--content-min);
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 12px 16px; height: 80px; box-sizing: border-box;
    }
    .app-header img {
      height: 56px; width: auto; display: block;
    }
    .lang-toggle {
      height: 32px; display: flex; align-items: center; gap: 6px;
      border: 1.5px solid rgba(42,127,127,0.3); border-radius: 8px;
      padding: 0 10px; cursor: pointer; background: none;
      font-size: 12px; font-weight: 700; color: #2A7F7F;
      transition: color 0.2s, border-color 0.2s, background 0.2s; white-space: nowrap;
    }
    .lang-toggle:hover { background: #2A7F7F; color: #fff; border-color: #2A7F7F; }


    /* ── MENU WRAPPER ── */
    .menu-wrapper {
      width: 100%; max-width: var(--content-max); min-width: var(--content-min);
      margin: 0 auto; background: #fff;
      min-height: calc(100vh - 56px);
      padding-bottom: 100px; display: none; margin-top: 80px;
    }
    .menu-wrapper.visible { display: block; }

    /* ── HERO ── */
    .hero { width: 100%; height: 180px; overflow: hidden; }
    .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── TABS ── */
    .full-width-tabs {
      position: sticky; top: 80px; z-index: 10;
      display: flex; justify-content: center;
      background: #fff; border-bottom: 2px solid #F2EFE6;
    }
    .tabs-bar {
      width: 100%; max-width: var(--content-max); min-width: var(--content-min);
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
      touch-action: pan-x;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }
    .tabs { display: flex; touch-action: pan-x; }
    .tab-btn {
      flex: 0 0 auto;
      padding: 13px 0; border: none; background: none;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      color: #8a8070; cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
      text-transform: uppercase; white-space: pre; text-align: center;
      line-height: 1.3; padding: 10px 0;
    }
    .tab-btn.active { color: #2A7F7F; border-bottom-color: #CC3300; }

    /* ── PANELS ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── SECTION HEADER (Sıcak / Soğuk gibi alt başlıklar) ── */
    .section-header {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #8a8070;
      padding: 16px 16px 4px; border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }

    /* ── MENU LIST ── */
    .menu-list { padding: 0 16px; }
    .menu-item {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 14px 0; border-bottom: 1px solid rgba(42,127,127,0.15);
    }
    .menu-item:last-child { border-bottom: none; }
    .item-img {
      width: 88px; height: 88px; min-width: 88px;
      border-radius: 8px; overflow: hidden;
      background: #F2EFE6; border: 1px solid rgba(42,127,127,0.15);
    }
    .item-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .item-info { flex: 1; display: flex; flex-direction: column; gap: 4px; padding-top: 2px; }
    .item-name { font-size: 14px; font-weight: 700; color: #1a1a1a; line-height: 1.3; }
    .item-desc { font-size: 11px; color: #8a8070; line-height: 1.55; }
    .item-price { font-size: 13px; font-weight: 700; color: #2A7F7F; margin-top: 5px; }

    /* ── WHATSAPP ── */
    .wa-btn {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #25D366; color: #fff; border: none; border-radius: 50px;
      padding: 14px 28px; font-size: 15px; font-weight: 700; cursor: pointer;
      display: none; align-items: center; gap: 10px; text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4); white-space: nowrap; z-index: 100;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .wa-btn.visible { display: flex; }
    .wa-btn:hover { transform: translateX(-50%) translateY(-2px); box-shadow: 0 6px 28px rgba(37,211,102,0.55); }
    .wa-btn:active { transform: translateX(-50%) scale(0.97); }
    .wa-icon { width: 22px; height: 22px; flex-shrink: 0; }

    @media (min-width: 600px) {
      .menu-wrapper { border-left: 1px solid rgba(42,127,127,0.15); border-right: 1px solid rgba(42,127,127,0.15); }
      .hero { height: 220px; }
      .item-img { width: 100px; height: 100px; min-width: 100px; }
      .item-name { font-size: 15px; } .item-desc { font-size: 12px; } .item-price { font-size: 14px; }
    }
  </style>
</head>

<script>
  var currentLang = 'tr';
  var strings = {
    tr: { order: 'Sipariş Ver', flag: '🇬🇧', label: 'EN' },
    en: { order: 'Order Now',   flag: '🇹🇷', label: 'TR' }
  };

  function calcTabWidth() {
    var tabs = document.querySelectorAll('.tab-btn');
    var bar = document.getElementById('tabs-bar');
    var containerWidth = Math.min(Math.max(bar.offsetWidth, 300), 600);
    var canvas = document.createElement('canvas');
    var ctx = canvas.getContext('2d');
    ctx.font = '700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    var maxWordWidth = 0;
    tabs.forEach(function(btn) {
      var trWords = (btn.getAttribute('data-tr') || '').toUpperCase().replace(/&#10;/g, ' ').split(' ');
      var enWords = (btn.getAttribute('data-en') || '').toUpperCase().replace(/&#10;/g, ' ').split(' ');
      trWords.concat(enWords).forEach(function(word) {
        if (word) maxWordWidth = Math.max(maxWordWidth, ctx.measureText(word).width);
      });
    });
    var minTabWidth = Math.ceil(maxWordWidth) + 32;
    var fitsFloat = containerWidth / minTabWidth;
    var half = Math.floor(fitsFloat) + 0.5;
    if (half < 3.5) half = 3.5;
    var tabWidth = Math.floor(containerWidth / half);
    tabs.forEach(function(btn) { btn.style.width = tabWidth + 'px'; });
  }

  function applyLang(lang) {
    currentLang = lang;
    var s = strings[lang];
    document.getElementById('wa-label').textContent   = s.order;
    document.getElementById('lang-flag').textContent  = s.flag;
    document.getElementById('lang-label').textContent = s.label;
    document.querySelectorAll('[data-tr]').forEach(function(el) {
      // Tab butonları için innerText (&#10; → newline), diğerleri için textContent
      if (el.classList.contains('tab-btn')) {
        el.innerText = el.getAttribute('data-' + lang).replace(/&#10;/g, '\n');
      } else {
        el.textContent = el.getAttribute('data-' + lang);
      }
    });
    document.documentElement.lang = lang;
    calcTabWidth();
  }

  function setLang(lang) {
    document.getElementById('lang-screen').style.display = 'none';
    document.getElementById('menu').classList.add('visible');
    document.getElementById('main-header').style.display = 'flex';
    document.getElementById('wa-btn').classList.add('visible');
    applyLang(lang);
  }

  function toggleLang() { applyLang(currentLang === 'tr' ? 'en' : 'tr'); }

  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('panel-' + tab).classList.add('active');
    btn.classList.add('active');
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  window.addEventListener('resize', calcTabWidth);
</script>
